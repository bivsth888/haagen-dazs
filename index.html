<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Häagen-Dazs — Nutrition Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --deep: #1A1008;
  --burgundy: #6B1A2A;
  --burgundy-hover: #8B2A3A;
  --gold: #C8954A;
  --gold-light: #E8B870;
  --muted: #8A7E74;
  --border: rgba(106,26,42,0.13);
  --card-bg: #FFFFFF;
  --sorbet-green: #1D6B52;
  --sorbet-bg: #E8F5EF;
  --smoothie-blue: #1A4A7A;
  --smoothie-bg: #E8F0FA;
  --shake-purple: #4A1A7A;
  --shake-bg: #F0E8FA;
  --sundae-amber: #7A4A1A;
  --sundae-bg: #FAF0E8;
  --cone-teal: #1A6B6B;
  --cone-bg: #E8F5F5;
  --lemon-green: #4A7A1A;
  --lemon-bg: #F0FAE8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--deep); min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--burgundy);
  padding: 14px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(106,26,42,0.35);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.hd-circle {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--cream); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.header-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--cream); }
.header-sub { font-size: 10px; color: rgba(250,247,242,0.6); letter-spacing: 0.08em; text-transform: uppercase; }
.header-right { font-size: 12px; color: rgba(250,247,242,0.75); text-align: right; }

/* ── MAIN TABS ── */
.main-tabs {
  background: var(--burgundy);
  display: flex; overflow-x: auto; gap: 2px; padding: 0 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  -ms-overflow-style: none; scrollbar-width: none;
}
.main-tabs::-webkit-scrollbar { display: none; }
.main-tab {
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  color: rgba(250,247,242,0.6); background: transparent; border: none;
  cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent;
  font-family: 'DM Sans', sans-serif; transition: all 0.18s; flex-shrink: 0;
}
.main-tab:hover { color: rgba(250,247,242,0.9); }
.main-tab.active { color: var(--cream); border-bottom-color: var(--gold); }

/* ── TAB PANELS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── CONTROLS ── */
.controls {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
input[type=text] {
  width: 100%; padding: 10px 10px 10px 34px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--deep);
  background: var(--cream); outline: none; transition: border-color 0.2s;
}
input[type=text]:focus { border-color: var(--burgundy); }
input[type=text]::placeholder { color: var(--muted); }
.filter-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.pill-btn {
  padding: 8px 16px; border-radius: 22px;
  border: 1.5px solid var(--border); background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.pill-btn:active { transform: scale(0.97); }
.pill-active { background: var(--burgundy) !important; color: white !important; border-color: var(--burgundy) !important; }
.pill-ic { background: #EEEDFE !important; color: #3C3489 !important; border-color: #AFA9EC !important; }
.pill-so { background: var(--sorbet-bg) !important; color: var(--sorbet-green) !important; border-color: #9FE1CB !important; }

/* ── SORT BAR ── */
.sort-bar {
  background: var(--cream); padding: 9px 18px;
  display: flex; gap: 7px; align-items: center;
  overflow-x: auto; border-bottom: 1px solid var(--border);
  -ms-overflow-style: none; scrollbar-width: none;
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; margin-right: 4px; flex-shrink: 0; }
.sort-btn {
  padding: 6px 14px; border-radius: 18px;
  border: 1.5px solid var(--border); background: white;
  font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--deep);
  cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.18s;
}
.sort-btn.active { background: var(--gold); color: var(--deep); border-color: var(--gold); font-weight: 500; }
.sort-btn:active { transform: scale(0.97); }

/* ── RESULTS BAR ── */
.results-bar { padding: 8px 18px; font-size: 12px; color: var(--muted); }
.results-bar strong { color: var(--deep); }

/* ── CARDS GRID ── */
.cards-grid {
  padding: 0 14px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 12px;
}

/* ── FLAVOR CARD ── */
.flavor-card {
  background: var(--card-bg); border-radius: 14px;
  border: 1px solid var(--border); overflow: hidden;
  transition: transform 0.15s;
}
.flavor-card:active { transform: scale(0.99); }
.flavor-card.is-ic    { border-top: 3px solid var(--burgundy); }
.flavor-card.is-so    { border-top: 3px solid var(--sorbet-green); }
.flavor-card.is-sm    { border-top: 3px solid var(--smoothie-blue); }
.flavor-card.is-sh    { border-top: 3px solid var(--shake-purple); }
.flavor-card.is-su    { border-top: 3px solid var(--sundae-amber); }
.flavor-card.is-co    { border-top: 3px solid var(--cone-teal); }
.flavor-card.is-le    { border-top: 3px solid var(--lemon-green); }

.card-header { padding: 12px 14px 9px; border-bottom: 1px solid var(--border); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.card-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--deep); line-height: 1.2; }
.type-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em; }
.badge-ic { background: #EEEDFE; color: #3C3489; }
.badge-so { background: var(--sorbet-bg); color: var(--sorbet-green); }
.badge-sm { background: var(--smoothie-bg); color: var(--smoothie-blue); }
.badge-sh { background: var(--shake-bg); color: var(--shake-purple); }
.badge-su { background: var(--sundae-bg); color: var(--sundae-amber); }
.badge-co { background: var(--cone-bg); color: var(--cone-teal); }
.badge-le { background: var(--lemon-bg); color: var(--lemon-green); }
.card-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.card-size { font-size: 10px; color: var(--gold); font-weight: 500; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

/* ── SUGAR ROW ── */
.sugar-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; background: #FAEEDA; border-top: 1px solid #F0D8A0;
}
.sugar-label { font-size: 11px; font-weight: 500; color: #633806; text-transform: uppercase; letter-spacing: 0.05em; }
.sugar-sub { font-size: 10px; color: #854F0B; }
.sugar-bar-wrap { flex: 1; margin: 0 12px; }
.sugar-bar-bg { background: rgba(180,120,20,0.2); border-radius: 4px; height: 5px; }
.sugar-bar-fill { height: 5px; border-radius: 4px; background: var(--gold); }
.sugar-val { font-size: 20px; font-weight: 500; color: #633806; }

/* ── NUTRITION GRID ── */
.nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
.nutr-cell { padding: 10px 6px; text-align: center; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.nutr-cell:nth-child(4n) { border-right: none; }
.nutr-cell:nth-last-child(-n+4) { border-bottom: none; }
.nutr-val { font-size: 16px; font-weight: 500; color: var(--deep); line-height: 1; }
.nutr-val.hl-ic { color: var(--burgundy); }
.nutr-val.hl-so { color: var(--sorbet-green); }
.nutr-val.hl-sm { color: var(--smoothie-blue); }
.nutr-val.hl-sh { color: var(--shake-purple); }
.nutr-val.hl-su { color: var(--sundae-amber); }
.nutr-val.hl-co { color: var(--cone-teal); }
.nutr-val.hl-le { color: var(--lemon-green); }
.nutr-unit { font-size: 9px; color: var(--muted); }
.nutr-label { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

/* ── CARD FOOTER ── */
.card-footer { padding: 7px 14px; display: flex; flex-wrap: wrap; gap: 4px; border-top: 1px solid var(--border); }
.attr-tag { font-size: 10px; padding: 2px 7px; border-radius: 7px; font-weight: 500; }
.tag-gf { background: #EAF3DE; color: #27500A; }
.tag-ko { background: #E6F1FB; color: #0C447C; }
.tag-nd { background: #FAEEDA; color: #633806; }
.tag-al { background: #FBEAF0; color: #72243E; }
.tag-info { background: #F1EFE8; color: #444441; font-size: 9px; }

/* ── RANGE DISPLAY ── */
.range-note { font-size: 10px; color: var(--muted); font-style: italic; padding: 4px 14px 6px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 50px 20px; grid-column: 1/-1; color: var(--muted); }

/* ══════════════════════════════════
   FACTS TAB
══════════════════════════════════ */
.facts-controls {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.fact-filter-btn {
  padding: 7px 16px; border-radius: 20px;
  border: 1.5px solid var(--border); background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.fact-filter-btn.active { background: var(--burgundy); color: white; border-color: var(--burgundy); }
.fact-filter-btn:active { transform: scale(0.97); }
.facts-grid { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.fact-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; gap: 12px; align-items: flex-start;
  transition: border-color 0.15s;
}
.fact-card:hover { border-color: rgba(106,26,42,0.3); }
.fact-num {
  min-width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 1px;
}
.fn-sugar { background: #FAEEDA; color: #633806; }
.fn-cal   { background: #FCEBEB; color: #791F1F; }
.fn-fat   { background: #EEEDFE; color: #3C3489; }
.fn-prot  { background: #E1F5EE; color: #085041; }
.fn-sod   { background: #E6F1FB; color: #0C447C; }
.fn-carbs { background: #FBEAF0; color: #72243E; }
.fn-spec  { background: #F1EFE8; color: #444441; }
.fact-body { flex: 1; }
.fact-q { font-size: 13px; font-weight: 500; color: var(--deep); margin-bottom: 5px; line-height: 1.4; }
.fact-a { font-size: 12px; color: var(--muted); line-height: 1.55; }
.fact-a strong { color: var(--deep); font-weight: 500; }
.fact-pill {
  display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 9px;
  font-weight: 500; margin-left: 6px; vertical-align: middle;
}
.fp-sugar { background: #FAEEDA; color: #633806; }
.fp-cal   { background: #FCEBEB; color: #791F1F; }
.fp-fat   { background: #EEEDFE; color: #3C3489; }
.fp-prot  { background: #E1F5EE; color: #085041; }
.fp-sod   { background: #E6F1FB; color: #0C447C; }
.fp-carbs { background: #FBEAF0; color: #72243E; }
.fp-spec  { background: #F1EFE8; color: #444441; }
.facts-count { padding: 6px 18px 2px; font-size: 11px; color: var(--muted); }

/* ── FOOTER ── */
footer { text-align: center; padding: 16px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 8px; }

@media (max-width: 480px) {
  .cards-grid { grid-template-columns: 1fr; padding: 0 10px 20px; }
  .header-title { font-size: 17px; }
}
</style>
</head>

      <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
        <ellipse cx="20" cy="23" rx="13" ry="9" fill="#6B1A2A"/>
        <ellipse cx="20" cy="21" rx="11" ry="8" fill="#8B2A3A"/>
        <path d="M13 19 Q20 12 27 19" stroke="#C8954A" stroke-width="1.5" fill="none"/>
        <circle cx="20" cy="13" r="4" fill="#C8954A"/>

    </div>
    <div>

      <div class="header-sub">Complete Nutrition Guide</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <button class="main-tab active" onclick="switchTab('icecream', this)">🍦 Ice Cream &amp; Sorbet</button>
  <button class="main-tab" onclick="switchTab('smoothies', this)">🥤 Smoothies</button>
  <button class="main-tab" onclick="switchTab('shakes', this)">🥛 Shakes &amp; Lemonades</button>

  <button class="main-tab" onclick="switchTab('cones', this)">🍦 Cones &amp; Cups</button>
  <button class="main-tab" onclick="switchTab('facts', this)">💡 40 Key Facts</button>
</div>

     TAB 1: ICE CREAM & SORBET
═══════════════════════════════════════════ -->

    </div>

    <button class="sort-btn" id="ic-sort-sugar" onclick="setICSort('sugar',this)">Sugar</button>

<!-- ═══════════════════════════════════════════
     TAB 5: CONES & CUPS
═══════════════════════════════════════════ -->
<div class="tab-panel" id="panel-cones">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="co-search" placeholder="Search cones or cups..." oninput="renderCO()">
    </div>
    <div class="filter-pills">
      <button class="pill-btn pill-active" id="co-all" onclick="setCOFilter('all',this)">All Sizes</button>

// ═══════════ HELPERS ═══════════
function catMeta(type){
  const m = {
    ic:{cls:'is-ic',hl:'hl-ic',bc:'badge-ic',label:'Ice Cream'},
    so:{cls:'is-so',hl:'hl-so',bc:'badge-so',label:'Sorbet'},
    sm:{cls:'is-sm',hl:'hl-sm',bc:'badge-sm',label:'Smoothie'},
    sh:{cls:'is-sh',hl:'hl-sh',bc:'badge-sh',label:'Shake'},
    le:{cls:'is-le',hl:'hl-le',bc:'badge-le',label:'Lemonade'},
    su:{cls:'is-su',hl:'hl-su',bc:'badge-su',label:'Dazzler'},
    sd:{cls:'is-su',hl:'hl-su',bc:'badge-su',label:'Sundae'},
    co:{cls:'is-co',hl:'hl-co',bc:'badge-co',label:'Cone/Cup'},
  };
  return m[type]||m.ic;
}

function sugarBar(val, max){
  const pct = Math.min(100, Math.round(val/max*100));
  return `<div class="sugar-bar-bg"><div class="sugar-bar-fill" style="width:${pct}%"></div></div>`;
}

function buildCard(d, type, sizeLabel, sugarMax, extraInfo){
  const m = catMeta(type);
  const tags = [];
  if(d.gf) tags.push('<span class="attr-tag tag-gf">GF</span>');
  if(d.kosher) tags.push('<span class="attr-tag tag-ko">Kosher</span>');
  if(d.dairy===false) tags.push('<span class="attr-tag tag-nd">Non-Dairy</span>');
  if(d.alcohol) tags.push('<span class="attr-tag tag-al">&lt;0.5% Alc</span>');
  if(d.allergens) tags.push(`<span class="attr-tag tag-info">${d.allergens}</span>`);
  if(extraInfo) tags.push(`<span class="attr-tag tag-info">${extraInfo}</span>`);

  const sugarNum = typeof d.sugar === 'number' ? d.sugar : d.sugarMin;

  return `<div class="flavor-card ${m.cls}">
    <div class="card-header">
      <div class="card-top">
        <div class="card-name">${d.name}</div>
        <span class="type-badge ${m.bc}">${m.label}</span>
      </div>
      ${d.desc?`<div class="card-desc">${d.desc}</div>`:''}
      ${d.base?`<div class="card-desc">${d.base} base</div>`:''}
      <div class="card-size">${sizeLabel||''}</div>
    </div>
    <div class="sugar-row">
      <div><div class="sugar-label">Sugar</div>${d.added?`<div class="sugar-sub">Added: ${d.added}g</div>`:''}</div>
      <div class="sugar-bar-wrap">${sugarBar(sugarNum, sugarMax)}</div>
      <div class="sugar-val">${typeof d.sugar==='number'?d.sugar+'g':d.sugarMin+'-'+d.sugarMax+'g'}</div>
    </div>
    <div class="nutrition-grid">
      <div class="nutr-cell"><div class="nutr-val ${m.hl}">${typeof d.calories==='number'?d.calories:d.caloriesMin+'-'+d.caloriesMax}</div><div class="nutr-label">Cal</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.fat}<span class="nutr-unit">g</span></div><div class="nutr-label">Fat</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.satfat}<span class="nutr-unit">g</span></div><div class="nutr-label">Sat Fat</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.protein}<span class="nutr-unit">g</span></div><div class="nutr-label">Protein</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.carbs}<span class="nutr-unit">g</span></div><div class="nutr-label">Carbs</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.fiber}<span class="nutr-unit">g</span></div><div class="nutr-label">Fiber</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.chol}<span class="nutr-unit">mg</span></div><div class="nutr-label">Chol</div></div>
      <div class="nutr-cell"><div class="nutr-val">${d.sodium}<span class="nutr-unit">mg</span></div><div class="nutr-label">Sodium</div></div>
    </div>
    ${tags.length?`<div class="card-footer">${tags.join('')}</div>`:''}
  </div>`;
}

// IC
let icFilter='all', icSort='name', icDir=1;
function setICFilter(f,btn){
  icFilter=f;
  document.querySelectorAll('#panel-icecream .pill-btn').forEach(b=>b.className='pill-btn');
  btn.className='pill-btn '+(f==='all'?'pill-active':f==='ic'?'pill-ic':'pill-so');
  renderIC();
}
function setICSort(k,btn){
  if(icSort===k) icDir*=-1; else{icSort=k;icDir=1;}
  document.querySelectorAll('#panel-icecream .sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIC();
}
function renderIC(){
  const q=document.getElementById('ic-search').value.toLowerCase();
  let rows=icData.filter(d=>{
    const mc=icFilter==='all'||(icFilter==='ic'&&d.type==='ic')||(icFilter==='so'&&d.type==='so');
    const mq=!q||d.name.toLowerCase().includes(q)||d.allergens.toLowerCase().includes(q);
    return mc&&mq;
  });
  rows.sort((a,b)=>icDir*(typeof a[icSort]==='string'?a[icSort].localeCompare(b[icSort]):a[icSort]-b[icSort]));
  const grid=document.getElementById('ic-grid');
  const maxS=Math.max(...rows.map(d=>d.sugar));
  grid.innerHTML=rows.length?rows.map(d=>buildCard(d,d.type,'2/3 cup serving',maxS)).join(''):`<div class="empty-state"><p>No flavors found.</p></div>`;
  document.getElementById('ic-results').innerHTML=`Showing <strong>${rows.length}</strong> of ${icData.length} flavors`;
}

  let rows=smData.filter(d=>{
    const mf=smFilter==='all'||(smFilter==='small'&&d.size==='small')||(smFilter==='regular'&&d.size==='regular');
    const mq=!q||d.name.toLowerCase().includes(q)||d.base.toLowerCase().includes(q);
    return mf&&mq;
  });
  rows.sort((a,b)=>{
    if(smSort==='name'){
      const n=a.name.localeCompare(b.name); return n!==0?smDir*n:smDir*(a.calories-b.calories);
    }
    return smDir*(a[smSort]-b[smSort]);
  });
  const maxS=Math.max(...rows.map(d=>d.sugar));
  document.getElementById('sm-grid').innerHTML=rows.length?rows.map(d=>buildCard(d,'sm',`${d.size.charAt(0).toUpperCase()+d.size.slice(1)} · ${d.base} base`,maxS)).join(''):`<div class="empty-state"><p>No smoothies found.</p></div>`;
  document.getElementById('sm-results').innerHTML=`Showing <strong>${rows.length}</strong> of ${smData.length} entries`;
}

// FACTS
const catMeta2={sugar:{nc:'fn-sugar',pc:'fp-sugar',label:'Sugar'},cal:{nc:'fn-cal',pc:'fp-cal',label:'Calories'},fat:{nc:'fn-fat',pc:'fp-fat',label:'Fat'},prot:{nc:'fn-prot',pc:'fp-prot',label:'Protein'},sod:{nc:'fn-sod',pc:'fp-sod',label:'Sodium'},carbs:{nc:'fn-carbs',pc:'fp-carbs',label:'Carbs'},spec:{nc:'fn-spec',pc:'fp-spec',label:'Special'}};
let factsFilter='all';
function filterFacts(cat,btn){
  factsFilter=cat;
  document.querySelectorAll('.fact-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFacts();
}
function renderFacts(){
  const rows=factsFilter==='all'?facts:facts.filter(f=>f.cat===factsFilter);
  const m2=catMeta2;
  document.getElementById('facts-count').textContent=`Showing ${rows.length} of ${facts.length} facts`;
  document.getElementById('facts-grid').innerHTML=rows.map((f,i)=>{
    const gnum=facts.indexOf(f)+1;
    const cm=m2[f.cat];
    return `<div class="fact-card">
      <div class="fact-num ${cm.nc}">${gnum}</div>
      <div class="fact-body">
        <div class="fact-q">${f.q}<span class="fact-pill ${cm.pc}">${cm.label}</span></div>
        <div class="fact-a">${f.a}</div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════ TAB SWITCHER ═══════════
function switchTab(tab, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  btn.classList.add('active');
  updateHeaderCount();
}

function updateHeaderCount(){
  const panels={icecream:icData.length,smoothies:smData.length,shakes:shData.length,sundaes:suDataClean.length,cones:coData.length,facts:facts.length};
  const active=document.querySelector('.tab-panel.active').id.replace('panel-','');
  document.getElementById('headerCount').textContent=panels[active]||'—';
}
